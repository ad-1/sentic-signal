services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentic-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI — http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentic-ingestor
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    # Override RABBITMQ_HOST so the container addresses the sibling service,
    # not localhost (which would point to the container itself).
    environment:
      RABBITMQ_HOST: rabbitmq

volumes:
  rabbitmq-data:
