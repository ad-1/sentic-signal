# Locally (VS Code): run `scripts/gen-env.sh` to generate a .env file from
# this file. Secrets (API keys) are injected separately via Kubernetes Secrets
# or a local secrets file — never stored here.

image:
  repository: ghcr.io/ad-1/sentic-signal
  tag: "latest"
  pullPolicy: IfNotPresent

config:
  provider: "yahoo_rss" # One of: alpha_vantage, finnhub, yahoo_rss
  ticker: "TSLA"
  newsLookbackMinutes: "10080"
  newsRelevanceThreshold: "0.1"

rabbitmq:
  host: "rabbitmq" # Service name in k8s; overridden to "localhost" in .env
  port: "5672"
  queue: "raw-news"
  username: "default_user"  # Operator-generated default; override per-environment
  credentialsSecret: "definition-default-user"  # Secret name created by RabbitMQ operator

schedule: "0 */2 * * *"

concurrencyPolicy: Forbid
restartPolicy: OnFailure
