apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "sentic-signal-chart.fullname" . }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: {{ .Chart.Name }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            envFrom:
              # Non-secret config from ConfigMap (rendered from values.yaml)
              - configMapRef:
                  name: {{ include "sentic-signal-chart.fullname" . }}-config
            env:
              # RabbitMQ connection details from the operator-generated default-user Secret.
              # The Cluster Operator populates host, port, username, and password automatically.
              # Secret name: <cluster-name>-default-user (e.g. definition-default-user)
              - name: RABBITMQ_HOST
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.rabbitmq.credentialsSecret }}
                    key: host
              - name: RABBITMQ_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.rabbitmq.credentialsSecret }}
                    key: username
              - name: RABBITMQ_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.rabbitmq.credentialsSecret }}
                    key: password
              {{- if eq .Values.config.provider "alpha_vantage" }}
              - name: ALPHA_VANTAGE_KEY
                valueFrom:
                  secretKeyRef:
                    name: sentic-signal-secrets
                    key: alpha-vantage-key
              {{- end }}
              {{- if eq .Values.config.provider "finnhub" }}
              - name: FINNHUB_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: sentic-signal-secrets
                    key: finnhub-api-key
              {{- end }}
          restartPolicy: {{ .Values.restartPolicy }}
