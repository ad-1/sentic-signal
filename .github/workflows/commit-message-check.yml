name: Commit Message Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  commit-message-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SEN commit subjects
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          pattern='^SEN(-[0-9]+)?: .+'
          failed=0
          checked=0

          while IFS= read -r sha; do
            subject="$(git log --format=%s -n 1 "${sha}")"
            checked=$((checked + 1))
            if ! [[ "${subject}" =~ ${pattern} ]]; then
              echo "Invalid commit message for ${sha}: ${subject}"
              failed=1
            fi
          done < <(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")

          if [[ "${checked}" -eq 0 ]]; then
            echo "No non-merge commits to validate."
            exit 0
          fi

          if [[ "${failed}" -ne 0 ]]; then
            echo "Expected format: SEN(-<number>)?: <summary>"
            echo "Examples:"
            echo "  SEN: align workflow naming"
            echo "  SEN-42: simplify chart values handling"
            exit 1
          fi
