name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  IMAGE_NAME: ghcr.io/ad-1/sentic-signal

jobs:
  # ---------------------------------------------------------------------------
  # Run unit tests (always — PR and push to main)
  # Integration tests (tests/integration/) are empty pending sentic-analyst
  # contract definition. Add them here once the analyst payload is stable.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run unit tests
        run: |
          pytest tests/unit \
            --cov=sentic_signal \
            --cov-report=term-missing

  # ---------------------------------------------------------------------------
  # Helm lint and template render for base values and all provider overlays.
  # Catches chart regressions and validates that secrets are correctly scoped
  # per provider before any image push or deployment.
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm Lint & Render
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        overlay:
          - name: yahoo_rss (base)
            files: "-f deploy/sentic-signal-chart/values.yaml"
          - name: alpha_vantage
            files: "-f deploy/sentic-signal-chart/values.yaml -f
              deploy/sentic-signal-chart/values-alpha-vantage.yaml"
          - name: finnhub
            files: "-f deploy/sentic-signal-chart/values.yaml -f
              deploy/sentic-signal-chart/values-finnhub.yaml"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint (${{ matrix.overlay.name }})
        run: |
          helm lint deploy/sentic-signal-chart \
            ${{ matrix.overlay.files }} \
            --strict

      - name: Helm template render (${{ matrix.overlay.name }})
        run: |
          helm template sentic-signal deploy/sentic-signal-chart \
            ${{ matrix.overlay.files }} \
            --debug > /dev/null

  # ---------------------------------------------------------------------------
  # Build image, scan for vulnerabilities, push to GHCR.
  # Only runs on push to main after tests AND helm-lint pass.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push
    needs: [ test, helm-lint ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      # Scan the pushed image — fails the job on any CRITICAL finding,
      # which prevents the image tag write-back and ArgoCD deployment.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: "1"
          severity: CRITICAL

  # ---------------------------------------------------------------------------
  # Write the new image SHA tag back to values.yaml via a PR.
  # ArgoCD detects the merged PR and syncs the cluster.
  # ---------------------------------------------------------------------------
  update-image-tag:
    name: Update Image Tag
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tag in values.yaml
        run: |
          sed -i 's/^  tag: .*/  tag: "sha-${{ steps.sha.outputs.short }}"/' \
            deploy/sentic-signal-chart/values.yaml

      - name: Open pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "SEN-0: update sentic-signal image tag to sha-${{
            steps.sha.outputs.short }}"
          branch: ci/image-tag-${{ steps.sha.outputs.short }}
          delete-branch: true
          title: "SEN-0: bump sentic-signal image tag → sha-${{ steps.sha.outputs.short }}"
          body: |
            Automated image tag update from CI.

            **Image:** `ghcr.io/ad-1/sentic-signal:sha-${{ steps.sha.outputs.short }}`
            **Commit:** ${{ github.sha }}

            Merge this PR to trigger an ArgoCD sync and deploy the new image.
          base: main

      - name: Enable auto-merge for image tag PR
        id: auto_merge
        if: steps.cpr.outputs.pull-request-number != ''
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Warn when auto-merge could not be enabled
        if: steps.auto_merge.outcome == 'failure'
        run: |
          echo "::warning::Auto-merge could not be enabled for the image-tag PR."
          echo "::warning::Enable repository auto-merge and verify branch protection/merge settings."
