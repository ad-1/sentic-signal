name: Sentic-Signal CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. TEST: Ensure the logic isn't broken
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest  # Ensuring test runner is present

      - name: Run Tests
        run: pytest

  # 2. BUILD: Create the Docker image
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only build on actual pushes, not PRs
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sentic-signal:latest

  # 3. DEPLOY: Update the Helm Chart in your cluster
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }} # Your cluster credentials

      - name: Deploy Helm Chart
        run: |
          helm upgrade --install sentic-release ./charts/sentic-signal-chart \
            --set image.tag=latest \
            --values ./charts/sentic-signal-chart/values.yaml

  # 4. VALIDATE: Check if the CronJob exists and is healthy
  validate:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Verify CronJob
        run: |
          kubectl get cronjob sentic-release-sentic-signal-chart
          echo "Pipeline deployment validated successfully."
